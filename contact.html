<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(to right,#0f172a,#1e3a8a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */
.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#1e3a8a;
}

/* Inputs */
input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

textarea{
    resize:none;
    height:100px;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ff9900;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e68a00;
}

/* Home button */
.home-btn{
    margin-top:10px;
    display:block;
    text-decoration:none;
    background:#1e3a8a;
    color:white;
    padding:10px;
    border-radius:8px;
    transition:0.3s;
}

.home-btn:hover{
    background:#162456;
}
</style>

</head>
<body>

<div class="container">

<h1>Contact Us</h1>

<form id="contactForm">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

<a href="index.html" class="home-btn">🏠 Back to Home</a>

</div>

<script>

document
.getElementById("contactForm")
.addEventListener("submit",function(e){

e.preventDefault();

alert("✅ Message Sent Successfully!");

this.reset();

});

</script>

</body>
</html>
