<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | ShopHub</title>

<link rel="stylesheet" href="css/auth.css">

</head>
<body>

<div class="container">

<div class="form-box">

<h2>Welcome Back 👋</h2>

<p>Login to your ShopHub account</p>

<form id="loginForm">

<input
type="email"
id="loginEmail"
placeholder="Email"
required>

<input
type="password"
id="loginPassword"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<p>

Don't have an account?

<a href="signup.html">
Sign Up
</a>

</p>

</div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
