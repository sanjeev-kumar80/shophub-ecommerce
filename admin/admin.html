<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link rel="stylesheet" href="../css/style.css">

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f4f4;
}

.login-box{
width:350px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.login-box input{
width:100%;
padding:12px;
margin:12px 0;
}

.login-box button{
width:100%;
padding:12px;
background:#ff9900;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input id="email" placeholder="Admin Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">

Login

</button>

</div>

<script src="../js/admin-login.js"></script>

</body>
</html>
